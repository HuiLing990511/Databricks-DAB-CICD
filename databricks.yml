# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: dfe07f31-1f34-4ff3-b34a-ef05a65914dc

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: "citibike_dev"
  development:
    default: true
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405608014829407.7.azuredatabricks.net/
    variables:
      catalog: 
        default : "citibike_dev"
      schema: dev
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405609468858419.19.azuredatabricks.net/
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: 
        default : "citibike_test"
      schema: prod
      development:
        default: false
    permissions:
      - service_principal_name: c5770c5f-9736-45c8-b641-59a92592d9a5
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://adb-7405619754705006.6.azuredatabricks.net/
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: 
        default : "citibike_prod"
      schema: prod
      development:
        default: false
    permissions:
      - service_principal_name: c5770c5f-9736-45c8-b641-59a92592d9a5
        level: CAN_MANAGE
